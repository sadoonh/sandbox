name: Validate Sandbox Jobs

on:
  pull_request:
    paths:
      - 'sandbox/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: uv sync

      - name: Validate sandbox jobs
        run: uv run python -m sandbox.validate
